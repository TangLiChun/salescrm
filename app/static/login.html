<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · Sales CRM</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <p class="eyebrow">Sales CRM</p>
    <h1>登录</h1>
    <p class="subtitle">登录后可查询 ASN 并将 role 邮箱导入联系人列表</p>

    <form id="login-form" class="login-form">
      <label class="field">
        <span>用户名</span>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </label>
      <label class="field">
        <span>密码</span>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">登录</button>
      <p id="login-error" class="form-error hidden"></p>
    </form>

    <div class="default-account">
      <p class="default-title">默认账号</p>
      <p>用户名：<code id="default-user">admin</code></p>
      <p>密码：<code id="default-pass">admin123</code></p>
    </div>
  </div>

  <script src="/static/login.js"></script>
</body>
</html>

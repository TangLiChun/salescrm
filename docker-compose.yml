services:
  salescrm:
    build: .
    container_name: salescrm
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      PORT: "8000"
      DATABASE_PATH: /app/data/salescrm.db
    volumes:
      - salescrm_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  salescrm_data:

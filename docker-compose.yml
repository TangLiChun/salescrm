services:
  salescrm:
    build: .
    container_name: salescrm
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      PORT: "8000"
      DATABASE_PATH: /app/data/salescrm.db
    volumes:
      - salescrm_data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import json, urllib.request
          r = urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=3)
          d = json.loads(r.read())
          raise SystemExit(0 if d.get("ok") and d.get("db") and d.get("schema") else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  salescrm_data:

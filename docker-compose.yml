services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: salescrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-salescrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salescrm}
      POSTGRES_DB: ${POSTGRES_DB:-salescrm}
    volumes:
      - salescrm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salescrm} -d ${POSTGRES_DB:-salescrm}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  salescrm:
    build: .
    container_name: salescrm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      PORT: "8000"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-salescrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salescrm}
      POSTGRES_DB: ${POSTGRES_DB:-salescrm}
      DATABASE_URL: postgresql://${POSTGRES_USER:-salescrm}:${POSTGRES_PASSWORD:-salescrm}@postgres:5432/${POSTGRES_DB:-salescrm}
      PI_AGENT_SERVICE_URL: ${PI_AGENT_SERVICE_URL:-http://pi-agent:8001}
      # 必须是 ≥16 字符的强随机值（openssl rand -hex 24）。留空或弱值时
      # 内部 API 自动禁用，Pi 回退内置 Python loop（sidecar 不可用）。
      PI_INTERNAL_SECRET: ${PI_INTERNAL_SECRET:-}
    volumes:
      # git pull 后重启容器即可生效，日常更新无需重建镜像
      - ./app:/app/app:ro
      - ./scripts:/app/scripts:ro
      - ./arin_lookup.py:/app/arin_lookup.py:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import json, urllib.request
          r = urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=3)
          d = json.loads(r.read())
          raise SystemExit(0 if d.get("ok") and d.get("db") and d.get("schema") else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  pi-agent:
    build: ./services/pi-agent
    container_name: salescrm-pi-agent
    restart: unless-stopped
    depends_on:
      salescrm:
        condition: service_healthy
    environment:
      PORT: "8001"
      CRM_INTERNAL_URL: http://salescrm:8000
      PI_INTERNAL_SECRET: ${PI_INTERNAL_SECRET:-}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8001/health').then(r=>r.json()).then(d=>process.exit(d.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  salescrm_pgdata:

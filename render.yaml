services:
  - type: web
    name: salescrm
    runtime: docker
    plan: free
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-4o-mini

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: salescrm
          POSTGRES_PASSWORD: salescrm
          POSTGRES_DB: salescrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://salescrm:salescrm@localhost:5432/salescrm_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install deps
        run: python -m pip install -r requirements-dev.txt
      - name: Install frontend deps
        run: npm ci
      - name: Frontend check
        run: npm run check:frontend
      - name: Frontend build artifacts current
        run: git diff --exit-code -- app/static/i18n.js app/static/login.js app/static/js
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Test
        run: pytest -q
